<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weathes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"> </div>
    <div class="header">
        <div class="brand_name">Weathes</div>
        
    </div>
    <div class="register_space">
        <div class="register">
            <div class="r_header">Login</div>
            <div class="r_blocks">
                <input type="text" class="r_input r_username" placeholder="username">
            </div>
            <div class="r_blocks">
                <input type="email" class="r_input r_email" placeholder="email">
            </div>
            <div class="r_blocks">
                <input type="password" class="r_input r_password" placeholder="password">
            </div>
            <div class="r_submit">login</div>
        </div>
        
    </div>
    <div class="dis"><p>Rooted in tradition, designed for today.</p> 
            <p>Every thread carries the soul of handcrafted artistry. </p>
            <p>Natural fabrics. Timeless elegance. Honest craftsmanship. </p>
            <p>Wear stories woven by skilled hands, not machines. </p>
            <p>Experience clothing that feels closer to nature and closer to you. </p> 
        </div>
</body>
</html>
