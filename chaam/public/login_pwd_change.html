<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Chaam</title>
  <link rel="icon" href="/img/weathes_logo.png">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/signup.css">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>
    
  <div class="background"></div>
  <div class="r_background">
    
  </div>
  <main>
  <div class="auth_header">Welcome</div>
  <div class="auth_space">
    <div class="auth_block_space">
      <div class="auth_block_header">
        Password
      </div>
     <input type="password" class="auth_block auth_password" placeholder="Enter  password">
     <div class="auth_block_dis_space">
       <div class="auth_block_dis auth_password_dis">
         username didnt exist!
       </div> </div>
    </div>

    <div class="auth_block_space">
      <div class="auth_block_otp_header_space">
        <div class="auth_block_otp_header">
        Confirm password
      </div>
       
      </div>
     <input type="password" class="auth_block auth_confirm_password" placeholder="Enter confirm password">
     <div class="auth_block_dis_space">
       <div class="auth_block_dis auth_confirm_password_dis">
         invalid password!
       </div> </div>
    </div>
  </div>
  <button class="auth_submit"> Sign in</button>
  <div class="auth_statement">
    if you didn't have an account. Go with <b style="font-weight:900"><a href="signup.html">signup</a> </b>
  </div>
  </main>
  <script src="/js/login_pwd_change.js"></script>
</body>
</html>
