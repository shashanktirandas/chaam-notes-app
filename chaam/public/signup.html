<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Chaam</title>
  <link rel="icon" href="../img/weathes_logo.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    
  <div class="background"></div>
  <div class="r_background">
    
  </div>
  <main>
  <div class="auth_header">Welcome</div>
  <div class="auth_space">
    <div class="auth_block_space">
      <div class="auth_block_header">
        Username
      </div>
     <input type="text" class="auth_block auth_username" placeholder="Enter username">
     <div class="auth_block_dis_space">
       <div class="auth_block_dis auth_username_dis">
         username already exist!
       </div> </div>
    </div>
    <div class="auth_block_space">
      <div class="auth_block_header">
        Email
      </div>
     <input type="email" class="auth_block auth_email" placeholder="Enter email">
      <div class="auth_block_dis_space">
       <div class="auth_block_dis auth_email_dis">
         email already exist!
       </div> </div>
    </div>
    <div class="auth_block_space">
      <div class="auth_block_header">
        Password
      </div>
     <input type="password" class="auth_block auth_password" placeholder="Enter password">
      <div class="auth_block_dis_space">
       <div class="auth_block_dis auth_password_dis">
         enter strong password!
       </div> </div>
    </div>
  </div>
  <button class="auth_submit"> Sign up</button>
  <div class="auth_statement">
    if you already have an account. Go with <b style="font-weight:900"><a href="login.html">signin</a> </b>
  </div>
  </main>
  <script src="../js/signup.js"></script>
</body>
</html>
